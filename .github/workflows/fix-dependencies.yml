name: Fix Dependencies and Lockfile

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  fix-dependencies:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build frontend
      run: npm run build

    - name: Build backend
      run: |
        cd backend
        npm install
        npm run build

    - name: Update lockfile
      run: npm install

    - name: Commit and push if changed
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        git add .
        git diff --staged --quiet || git commit -m "Fix dependency issues and update lockfile"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}