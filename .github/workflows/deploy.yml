name: Deploy to Production

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Permissions configuration to resolve CodeQL security warnings
# Following principle of least privilege:
# - contents: read - needed to access repository contents
# - packages: write - needed for publishing packages
# - id-token: write - needed for OIDC authentication with cloud providers
permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run tests
        run: npm test
        
      - name: Build
        run: npm run build
        
      - name: Deploy to production
        # Placeholder for actual deployment step
        run: echo "Deploying to production..."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}