name: Regenerate PNPM Lockfile

on:
  workflow_dispatch:

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: pnpm
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install dependencies and regenerate lockfile
        run: pnpm install
      - name: Commit updated pnpm-lock.yaml
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add pnpm-lock.yaml
          git commit -m "Regenerate pnpm-lock.yaml to match package.json" || echo "No changes to commit"
          git push
