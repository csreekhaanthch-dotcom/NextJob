services:
  # Frontend Static Site
  - type: web
    name: nextjob-frontend
    env: static
    region: oregon
    plan: free
    # Use fix script and explicitly use npm
    buildCommand: chmod +x scripts/fix-deployment.sh && scripts/fix-deployment.sh && npm install --prefer-offline --no-audit && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        value: https://nextjob-backend-cnah.onrender.com
      - key: PNPM_HOME
        value: ""
      - key: COREPACK_ENABLE_STRICT
        value: "0"
      - key: NPM_CONFIG_ENGINE_STRICT
        value: "false"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
  
  # Backend API Service
  - type: web
    name: nextjob-backend
    env: node
    region: oregon
    plan: free
    # Use fix script and explicitly use npm
    buildCommand: chmod +x ../scripts/fix-deployment.sh && ../scripts/fix-deployment.sh && npm install --prefer-offline --no-audit && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: RAPIDAPI_KEY
        sync: false
      - key: PNPM_HOME
        value: ""
      - key: COREPACK_ENABLE_STRICT
        value: "0"
      - key: NPM_CONFIG_ENGINE_STRICT
        value: "false"
    healthCheckPath: /health
    rootDir: backend