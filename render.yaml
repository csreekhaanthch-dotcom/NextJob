services:
  # Backend API Service (runs from server directory)
  - type: web
    name: jobboard-backend
    env: node
    region: oregon
    plan: free
    rootDir: ./server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: PORT
        value: 10000
      - key: RAPIDAPI_KEY
        sync: false
    healthCheckPath: /health

  # Frontend Static Site (runs from root)
  - type: web
    name: jobboard-frontend
    env: static
    region: oregon
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://jobboard-backend-ywzt.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html