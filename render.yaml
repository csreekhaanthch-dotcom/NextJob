services:
  # Backend API Service
  - type: web
    name: nextjob-backend
    env: node
    region: oregon
    plan: free
    buildCommand: rm -f pnpm-lock.yaml yarn.lock && npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_API_KEY
        sync: false