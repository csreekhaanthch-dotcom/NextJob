services:
  # Frontend Static Site
  - type: web
    name: nextjob-frontend
    env: static
    region: oregon
    plan: free
    # Aggressive npm enforcement
    buildCommand: chmod +x scripts/cleanup.sh && ./scripts/cleanup.sh && npm install --legacy-peer-deps && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NPM_CONFIG_PRODUCTION
        value: false
      - key: VITE_API_URL
        value: https://nextjob-backend-cnah.onrender.com
      - key: PNPM_HOME
        value: ""
      - key: COREPACK_ENABLE_STRICT
        value: "0"
      - key: NPM_CONFIG_ENGINE_STRICT
        value: "false"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    buildPack: https://github.com/renderinc/heroku-buildpack-nodejs
  
  # Backend API Service
  - type: web
    name: nextjob-backend
    env: node
    region: oregon
    plan: free
    # Aggressive npm enforcement
    buildCommand: chmod +x ../scripts/cleanup.sh && ../scripts/cleanup.sh && npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: RAPIDAPI_KEY
        sync: false
      - key: PNPM_HOME
        value: ""
      - key: COREPACK_ENABLE_STRICT
        value: "0"
      - key: NPM_CONFIG_ENGINE_STRICT
        value: "false"
    healthCheckPath: /health
    rootDir: backend
    buildPack: https://github.com/renderinc/heroku-buildpack-nodejs