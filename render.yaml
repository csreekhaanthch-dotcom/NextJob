services:
  # Frontend Static Site
  - type: web
    name: nextjob-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        value: https://nextjob-backend-cnah.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
  
  # Backend API Service
  - type: web
    name: nextjob-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && pnpm install --frozen-lockfile && pnpm run build
    startCommand: cd backend && pnpm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: RAPIDAPI_KEY
        sync: false
    healthCheckPath: /health