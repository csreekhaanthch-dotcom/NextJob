services:
  # Backend API Service
  - type: web
    name: jobdone-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install --include=dev && mkdir -p data && npm run build
    startCommand: cd backend && mkdir -p data && npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: RAPIDAPI_KEY
        sync: false
      - key: PORT
        value: 3001
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /health
    autoDeploy: true
