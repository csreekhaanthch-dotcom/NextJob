services:
  # Frontend Static Site
  - type: web
    name: nextjob-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: VITE_API_URL
        value: https://nextjob-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
  
  # Backend API Service
  - type: web
    name: nextjob-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: PORT
        value: 10000